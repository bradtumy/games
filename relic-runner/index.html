<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Relic Runner</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
      touch-action: none; /* let us fully control touch gestures */
    }
    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      right: 10px;
      color: white;
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      pointer-events: none;
    }
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px 20px;
      border-radius: 999px;
      border: 0;
      background: #ffcc33;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="hud">
    <div>Score: <span id="score">0</span></div>
    <div>Coins: <span id="coins">0</span></div>
  </div>

  <div id="overlay">
    <div>
      <h1>Relic Runner</h1>
      <p>Swipe left/right to move<br>Swipe up to jump</p>
      <button id="startBtn">Start</button>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    // --- Config / constants ---
    const LANE_COUNT   = 3;
    const LANE_SPREAD  = 150;   // px spread per lane at z=1
    const SPAWN_CHANCE = 0.02;  // per-frame probability of a new obstacle
    const COIN_TRAIL   = 5;     // coins per trail
    const COIN_GAP     = 0.1;   // z-spacing between trail coins
    const GRAVITY      = 0.5;   // downward acceleration
    const JUMP_VY      = -12;   // initial jump velocity
    const SPEED        = 0.02;  // z-advance per frame
    const HORIZON      = 0.2;   // horizon as a fraction of screen height
    const GROUND       = 0.8;   // player ground level as a fraction of screen height

    // Swipe tuning
    const SWIPE_MIN_PX = 18;    // minimum move before we consider it a swipe
    const SWIPE_COOLDOWN_MS = 110; // prevent multiple lane changes from one gesture

    // --- Cached DOM references ---
    const canvas   = document.getElementById("canvas");
    const ctx      = canvas.getContext("2d");
    const overlay  = document.getElementById("overlay");
    const scoreEl  = document.getElementById("score");
    const coinsEl  = document.getElementById("coins");
    const startBtn = document.getElementById("startBtn");

    // --- Viewport dimensions (updated on resize) ---
    let W, H;

    function resizeCanvas() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width  = W;
      canvas.height = H;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    // Allow the browser to finish rotating before sampling new dimensions
    window.addEventListener("orientationchange", () => setTimeout(resizeCanvas, 200));

    // --- Game state ---
    let lane, score, coins, running, vy, jumpY;
    let obstacles, coinArr;

    // Smooth lane movement (visual + collision)
    let lanePos; // float position in lane space [0..LANE_COUNT-1]
    const LANE_LERP = 0.22; // closer to 1 snaps, closer to 0 eases

    // --- Game control ---
    function startGame() {
      if (running) return; // prevent double-start
      lane      = 1;
      lanePos   = 1;
      score     = 0;
      coins     = 0;
      vy        = 0;
      jumpY     = 0;
      obstacles = [];
      coinArr   = [];
      overlay.style.display = "none";
      running = true;
      requestAnimationFrame(loop);
    }

    function endGame() {
      running = false;
      overlay.style.display = "flex";
    }

    // --- Spawning ---
    function spawn() {
      obstacles.push({ lane: Math.floor(Math.random() * LANE_COUNT), z: 0 });
      // 50% chance to also spawn a coin trail in a random lane
      if (Math.random() < 0.5) {
        const l = Math.floor(Math.random() * LANE_COUNT);
        for (let i = 0; i < COIN_TRAIL; i++) {
          coinArr.push({ lane: l, z: -i * COIN_GAP });
        }
      }
    }

    // --- Main game loop ---
    function loop() {
      if (!running) return;

      score += 0.5;
      if (Math.random() < SPAWN_CHANCE) spawn();

      // Clear background
      ctx.fillStyle = "#111";
      ctx.fillRect(0, 0, W, H);

      // Ease lane position toward target lane for smoother visuals and more forgiving collision
      lanePos += (lane - lanePos) * LANE_LERP;

      // Draw obstacles and check collisions
      for (const obs of obstacles) {
        obs.z += SPEED;
        const ox = W / 2 + (obs.lane - 1) * LANE_SPREAD * obs.z;
        const oy = H * HORIZON + H * (GROUND - HORIZON) * obs.z;
        ctx.fillStyle = "gray";
        ctx.fillRect(ox - 20, oy - 20, 40, 40);

        // Hit: near ground level, not in mid-jump, and close to lane center.
        if (obs.z > 0.8 && obs.z < 1 && !jumpY) {
          const laneDelta = Math.abs(obs.lane - lanePos);
          if (laneDelta < 0.35) {
            endGame();
            return;
          }
        }
      }

      // Draw coins and collect them
      for (const coin of coinArr) {
        coin.z += SPEED;
        if (coin.z <= 0) continue; // not yet past the horizon
        const cx = W / 2 + (coin.lane - 1) * LANE_SPREAD * coin.z;
        const cy = H * HORIZON + H * (GROUND - HORIZON) * coin.z;
        ctx.fillStyle = "gold";
        ctx.beginPath();
        ctx.arc(cx, cy, 10, 0, Math.PI * 2);
        ctx.fill();
        if (coin.z > 0.8 && coin.z < 1) {
          const laneDelta = Math.abs(coin.lane - lanePos);
          if (laneDelta < 0.35) {
            coins++;
            score += 10;
            coin.z = 2; // mark as collected so it gets pruned below
          }
        }
      }

      // Prune objects that have passed off-screen
      obstacles = obstacles.filter(o => o.z < 1.2);
      coinArr   = coinArr.filter(c => c.z < 1.2);

      // Physics: apply gravity when airborne
      if (vy || jumpY) {
        jumpY += vy;
        vy    += GRAVITY;
        if (jumpY > 0) { jumpY = 0; vy = 0; } // landed
      }

      // Draw player
      const px = W / 2 + (lanePos - 1) * LANE_SPREAD;
      const py = H * GROUND + jumpY;
      ctx.fillStyle = "blue";
      ctx.fillRect(px - 15, py - 30, 30, 40);

      // Update HUD
      scoreEl.textContent = Math.floor(score);
      coinsEl.textContent = coins;

      requestAnimationFrame(loop);
    }

    // --- Gesture input ---
    let down = false;
    let startX = 0;
    let startY = 0;
    let lastSwipeT = 0;

    function trySwipe(dx, dy) {
      if (!running) return;

      const absX = Math.abs(dx);
      const absY = Math.abs(dy);
      if (Math.max(absX, absY) < SWIPE_MIN_PX) return;

      if (absX > absY) {
        const now = performance.now();
        if ((now - lastSwipeT) < SWIPE_COOLDOWN_MS) return;
        lastSwipeT = now;
        if (dx > 0) lane = Math.min(LANE_COUNT - 1, lane + 1);
        else        lane = Math.max(0, lane - 1);
      } else if (dy < 0 && !jumpY) {
        vy = JUMP_VY;
      }
    }

    // Pointer events
    canvas.addEventListener("pointerdown", (e) => {
      if (!running) return;
      down = true;
      startX = e.clientX;
      startY = e.clientY;
      // Ensure we still get the pointerup even if the pointer leaves the canvas
      canvas.setPointerCapture?.(e.pointerId);
    });

    canvas.addEventListener("pointerup", (e) => {
      if (!down) return;
      down = false;
      trySwipe(e.clientX - startX, e.clientY - startY);
    });

    canvas.addEventListener("pointercancel", () => {
      down = false;
    });

    // Touch fallback (some iOS Safari versions)
    canvas.addEventListener("touchstart", (e) => {
      if (!running) return;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: true });

    canvas.addEventListener("touchend", (e) => {
      if (!running) return;
      trySwipe(
        e.changedTouches[0].clientX - startX,
        e.changedTouches[0].clientY - startY
      );
    }, { passive: true });

    // --- Button input ---
    startBtn.addEventListener("click", startGame);
    // preventDefault stops the subsequent synthetic click from double-firing startGame
    startBtn.addEventListener("touchend", e => {
      e.preventDefault();
      startGame();
    }, { passive: false });
  </script>

</body>
</html>
